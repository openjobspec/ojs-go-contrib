name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
        package:
          - ojs-chi
          - ojs-gin
          - ojs-echo
          - ojs-fiber
          - ojs-gorm
          - ojs-serverless
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        working-directory: ${{ matrix.package }}
        run: go vet ./...

      - name: Test
        working-directory: ${{ matrix.package }}
        run: go test ./... -race -cover
